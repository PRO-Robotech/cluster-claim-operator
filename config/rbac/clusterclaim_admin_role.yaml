# This rule is not used by the project cluster-claim-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over clusterclaim.in-cloud.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-claim-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterclaim-admin-role
rules:
- apiGroups:
  - clusterclaim.in-cloud.io
  resources:
  - clusterclaims
  verbs:
  - '*'
- apiGroups:
  - clusterclaim.in-cloud.io
  resources:
  - clusterclaims/status
  verbs:
  - get
