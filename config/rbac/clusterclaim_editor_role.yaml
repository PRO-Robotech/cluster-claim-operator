# This rule is not used by the project cluster-claim-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the clusterclaim.in-cloud.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-claim-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterclaim-editor-role
rules:
- apiGroups:
  - clusterclaim.in-cloud.io
  resources:
  - clusterclaims
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - clusterclaim.in-cloud.io
  resources:
  - clusterclaims/status
  verbs:
  - get
