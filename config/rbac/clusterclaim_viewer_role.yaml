# This rule is not used by the project cluster-claim-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to clusterclaim.in-cloud.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-claim-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterclaim-viewer-role
rules:
- apiGroups:
  - clusterclaim.in-cloud.io
  resources:
  - clusterclaims
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - clusterclaim.in-cloud.io
  resources:
  - clusterclaims/status
  verbs:
  - get
