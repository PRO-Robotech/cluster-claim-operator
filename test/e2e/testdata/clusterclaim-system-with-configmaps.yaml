apiVersion: clusterclaim.in-cloud.io/v1alpha1
kind: ClusterClaim
metadata:
  name: e2e-sys-cm
  namespace: e2e-test
spec:
  observeTemplateRef:
    name: e2e-observe
  certificateSetTemplateRef:
    infra:
      name: e2e-certset-infra
  clusterTemplateRef:
    infra:
      name: e2e-cluster-infra
  ccmCsrTemplateRef:
    name: e2e-ccm
  configMapTemplateRef:
    infra:
      name: e2e-cm-infra
  replicas: 3
  configuration:
    cpuCount: 4
    diskSize: 51200
    memory: 8192
  infra:
    role: system/infra
    paused: false
    network:
      serviceCidr: "10.96.0.0/12"
      podCidr: "10.244.0.0/16"
      clusterDNS: "10.96.0.10"
      kubeApiserverPort: 6443
    componentVersions:
      kubernetes:
        version: v1.34.4
  client:
    enabled: false
